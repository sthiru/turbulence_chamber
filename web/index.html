<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Control System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container-fluid">
        <header class="bg-primary text-white p-3 mb-4">
            <div class="row align-items-center">
                <div class="col">
                    <h1><i class="fas fa-thermometer-half"></i> Temperature Control System</h1>
                </div>
                <div class="col-auto">
                    <span id="connection-status" class="badge bg-secondary">
                        <i class="fas fa-circle"></i> Connecting...
                    </span>
                </div>
            </div>
        </header>

        <div class="row">
            <!-- Temperature Sensors -->
            <div class="col-lg-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-temperature-high"></i> Temperature Sensors</h5>
                    </div>
                    <div class="card-body">
                        <div class="row" id="temperature-sensors">
                            <!-- Sensors will be populated here -->
                        </div>
                    </div>
                </div>

                <!-- Temperature Chart -->
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-line"></i> Temperature Trends</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="tempChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="col-lg-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5><i class="fas fa-sliders-h"></i> Control Panel</h5>
                    </div>
                    <div class="card-body control-panel">
                        <!-- Hot Plates -->
                        <div class="mb-4">
                            <h6><i class="fas fa-fire"></i> Hot Plates</h6>
                            <div id="hot-plate-controls">
                                <!-- Hot plate controls will be populated here -->
                            </div>
                        </div>

                        <!-- Fan Controls -->
                        <div class="mb-4">
                            <h6><i class="fas fa-fan"></i> Fan Controls</h6>
                            <div id="fan-controls">
                                <!-- Fan controls will be populated here -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- System Status -->
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-info-circle"></i> System Status</h5>
                    </div>
                    <div class="card-body">
                        <div id="system-status">
                            <p><strong>System Ready:</strong> <span id="system-ready">Unknown</span></p>
                            <p><strong>Device Status:</strong> <span id="device-status">Unknown</span></p>
                            <div id="error-message" class="alert alert-danger d-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
