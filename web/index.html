<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbulence Controller - Main</title>
    <link href="/assets/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/all.min.css">
    <script src="/assets/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-wind me-2"></i>Turbulence Controller
            </a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/">Dashboard</a>
                <a class="nav-link" href="/configuration">Configuration</a>
                <a class="nav-link" href="/calibration">Calibration</a>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
        <div class="system-container">
            <!-- SVG System Model -->
            <div class="svg-container">
                <object data="/static/main.svg" type="image/svg+xml" width="100%" height="100%">
                    <img src="/static/main.svg" alt="Turbulence System Diagram" />
                </object>
            </div>
        </div>
        
        <!-- Connection Status Bottom Right -->
        <div id="connectionStatus" class="connection-status disconnected">
            <i class="fas fa-wifi"></i> Connecting...
        </div>
    </div>

    <!-- Temperature Trend Graph Overlay -->
    <div id="temperatureGraphOverlay" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-chart-line me-2"></i>Temperature Trend Graph</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <canvas id="temperatureTrendChart" height="400"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Camera Modal -->
    <div class="modal fade" id="cameraOverlay" tabindex="-1" aria-labelledby="cameraOverlayLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-video me-2"></i>Camera View</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Video frame -->
                    <div style="position: relative; background: #000; min-height: 400px; display: flex; align-items: center; justify-content: center;">
                        <!-- Video stream element -->
                        <image id="svgVideoStream" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style="max-height: 500px; object-fit: contain;"/>
                        <!-- Loading indicator -->
                        <div id="videoLoadingIndicator" style="position: absolute; color: #fff; font-weight: bold; font-size: 16px;">Loading Video...</div>
                        <!-- Video status indicator -->
                        <rect id="videoStatusIndicator" style="position: absolute; top: 10px; left: 10px; width: 12px; height: 12px; border-radius: 6px; background: #dc3545;"/>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Load Bottom Bar Component -->
    <div id="bottomBarContainer">
        <!-- Fixed Bottom Control Bar -->
        <div class="container-fluid py-2 fixed-bottom bg-light border-top">
            <div class="row justify-content-center align-items-center">
                <div class="col-auto">
                    <button id="startVideoBtn" class="btn btn-outline-primary btn-sm me-2" data-bs-toggle="modal" data-bs-target="#cameraOverlay">
                        <i class="fas fa-video me-1"></i> Open Camera
                    </button>
                    <button id="showTemperatureGraphBtn" class="btn btn-outline-info btn-sm me-2" data-bs-toggle="modal" data-bs-target="#temperatureGraphOverlay">
                        <i class="fas fa-chart-line me-1"></i> Temperature Trend
                    </button>
                    <button id="startCaptureBtn" class="btn btn-primary btn-sm me-2">
                        <i class="fas fa-play me-1"></i> Start Data Capture
                    </button>
                    <button id="stopCaptureBtn" class="btn btn-danger btn-sm me-2 d-none">
                        <i class="fas fa-stop me-1"></i> Stop Capture
                    </button>
                    <span class="text-muted me-2">
                        Data: <span id="dataCounter" class="badge bg-secondary">0</span>
                    </span>
                    <button id="downloadIconBtn" class="btn btn-outline-success btn-sm d-none" title="Download CSV">
                        <i class="fas fa-download"></i>
                    </button>
                    <button id="stopVideoBtn" class="btn btn-sm btn-outline-danger me-2 d-none" style="font-size: 0.8rem;">
                        <i class="fas fa-stop me-1"></i> Stop Stream
                    </button>
                    <button id="refreshCameraBtn" class="btn btn-sm btn-outline-primary d-none" style="font-size: 0.8rem;">
                        <i class="fas fa-sync-alt me-1"></i> Refresh Camera
                    </button>
                </div>
            </div>
        </div>

    </div>
    
    <script src="/static/components/bottom-bar.js"></script>
    <script src="/assets/bootstrap.bundle.min.js"></script>
    <script src="/static/overlays.js"></script>
    <script src="/static/camera.js"></script>
    <script src="/static/main.js"></script>
</body>
</html>
