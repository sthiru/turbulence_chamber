<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbulence Controller - Main</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    <!-- Fixed Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top" style="height: 50px;">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/" style="font-size: 1.1rem;">
                <i class="fas fa-thermometer-half text-primary me-2"></i>
                Turbulence Controller
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/main" style="font-size: 0.9rem;">
                    <i class="fas fa-sliders-h me-1"></i> Control Panel
                </a>
                <span class="navbar-text ms-3" style="font-size: 0.8rem;">
                    <i class="fas fa-video text-success me-1"></i> Live Video Stream
                </span>
            </div>
        </div>
    </nav>

    <!-- Add padding to account for fixed navbar -->
    <div style="padding-top: 60px;">
        <!-- Main Content -->
        <div class="system-container">
            <!-- Data Capture Section -->
            <div class="data-capture-section mb-3">
                <div class="card">
                    <div class="card-body py-2">
                        <div class="row align-items-center justify-content-center">
                            <div class="col-auto">
                                <button id="startCaptureBtn" class="btn btn-primary btn-sm">
                                    <i class="fas fa-play me-2"></i>Start Data Capture
                                </button>
                                <button id="stopCaptureBtn" class="btn btn-danger btn-sm d-none">
                                    <i class="fas fa-stop me-2"></i>Stop Capture
                                </button>
                            </div>
                            <div class="col-auto">
                                <div class="text-muted">
                                    <small>Data Acquired: </small>
                                    <span id="dataCounter" class="badge bg-secondary">0</span>
                                    <small> points</small>
                                </div>
                            </div>
                            <div class="col-auto">
                                <button id="downloadIconBtn" class="btn btn-outline-success btn-sm d-none" title="Download CSV">
                                    <i class="fas fa-download"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- SVG System Model -->
            <div class="svg-container">
                <object data="/static/main.svg" type="image/svg+xml" width="100%" height="100%">
                    <img src="/static/main.svg" alt="Turbulence System Diagram" />
                </object>
            </div>
        </div>
        
        <!-- Connection Status Bottom Right -->
        <div id="connectionStatus" class="connection-status disconnected">
            <i class="fas fa-wifi"></i> Connecting...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/main.js"></script>
</body>
</html>
