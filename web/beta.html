<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbulence Controller - Beta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/beta.css">
</head>
<body>
    <div class="container-fluid">
        <!-- Navigation -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-lg shadow mb-4">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <i class="fas fa-thermometer-half text-primary"></i>
                    Turbulence Controller
                </a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                    <a class="nav-link active" href="/beta">
                        <i class="fas fa-flask"></i> Beta View
                    </a>
                </div>
            </div>
        </nav>

        <!-- Connection Status -->
        <div id="connectionStatus" class="connection-status disconnected">
            <i class="fas fa-wifi"></i> Connecting...
        </div>

        <!-- Main Content -->
        <div class="system-container">
            <!-- SVG System Model -->
            <div class="svg-container">
                <object data="/static/beta.svg" type="image/svg+xml" width="100%" height="100%">
                    <img src="/static/beta.svg" alt="Turbulence System Diagram" />
                </object>
            </div>
            
            <!-- Status Panel -->
            <div class="status-panel">
                <h5 class="text-center mb-4">
                    <i class="fas fa-info-circle"></i> System Status
                </h5>
                <div class="row">
                    <div class="col-md-6">
                        <div class="status-item">
                            <span class="status-label">System Ready:</span>
                            <span class="status-value" id="systemReady">No</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Arduino Port:</span>
                            <span class="status-value" id="arduinoPort">--</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Hot Plate 1:</span>
                            <span class="status-value" id="hotplate1Status">OFF</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Hot Plate 2:</span>
                            <span class="status-value" id="hotplate2Status">OFF</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="status-item">
                            <span class="status-label">Fan 1 Speed:</span>
                            <span class="status-value" id="fan1Speed">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Fan 2 Speed:</span>
                            <span class="status-value" id="fan2Speed">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Fan 3 Speed:</span>
                            <span class="status-value" id="fan3Speed">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Fan 4 Speed:</span>
                            <span class="status-value" id="fan4Speed">0</span>
                        </div>
                    </div>
                </div>
                
                <!-- CN² Display -->
                <div class="cn2-display">
                    <h6 class="mb-2">
                        <i class="fas fa-wind"></i> Cn² Turbulence Parameter
                    </h6>
                    <div class="row">
                        <div class="col-6">
                            <small class="text-muted">Thermal:</small>
                            <div class="cn2-value" id="cn2Value">0.00e+0</div>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Optical:</small>
                            <div class="cn2-value" id="cn2OpticalValue">--</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/beta.js"></script>
</body>
</html>
